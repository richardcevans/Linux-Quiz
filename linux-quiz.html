<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Quiz</title>
<style>
  /* ── Theme variables ──────────────────────────────────────────────────────── */
  :root {
    --bg:             #f4f2f8;
    --card-bg:        #ffffff;
    --card-border:    #ded6f7;
    --shadow-sm:      0 4px 12px rgba(76,29,149,0.06);
    --shadow-lg:      0 14px 40px rgba(76,29,149,0.08);
    --surface:        #f1f5f9;
    --surface-border: #e2e8f0;
    --text-1:         #0f172a;
    --text-2:         #334155;
    --text-3:         #94a3b8;
    --text-4:         #64748b;
    --text-heading:   #1e1b4b;
    --accent:         #5b21b6;
    --accent-mid:     #6d28d9;
    --accent-dark:    #4c1d95;
    --accent-light:   #ede9fe;
    --accent-xlight:  #f5f3ff;
    --accent-border:  #c4b5fd;
    --code-text:      #1e293b;
    --top-bar:        linear-gradient(to right, #5b21b6, #6d28d9, #ede9fe);
    --progress-track: #ede9fe;
    --ok-bg:  #f0fdf4;  --ok-bdr:  #bbf7d0;  --ok-txt:  #166534;
    --err-bg: #fef2f2;  --err-bdr: #fecaca;  --err-txt: #991b1b;
  }
  [data-theme="navy"] {
    --bg:             #060d1a;
    --card-bg:        #0d1829;
    --card-border:    #1e3352;
    --shadow-sm:      0 4px 12px rgba(0,0,0,0.4);
    --shadow-lg:      0 14px 40px rgba(0,0,0,0.5);
    --surface:        #0a1929;
    --surface-border: #1e3352;
    --text-1:         #e2e8f0;
    --text-2:         #cbd5e1;
    --text-3:         #4a6580;
    --text-4:         #567a9a;
    --text-heading:   #f1f5f9;
    --accent:         #38bdf8;
    --accent-mid:     #0ea5e9;
    --accent-dark:    #7dd3fc;
    --accent-light:   #0c2231;
    --accent-xlight:  #081929;
    --accent-border:  #1e6fa8;
    --code-text:      #7dd3fc;
    --top-bar:        linear-gradient(to right, #0ea5e9, #38bdf8, #7dd3fc);
    --progress-track: #0c2231;
    --ok-bg:  #0a2218;  --ok-bdr:  #166534;  --ok-txt:  #4ade80;
    --err-bg: #2d0f0f;  --err-bdr: #991b1b;  --err-txt: #f87171;
  }
  [data-theme="dracula"] {
    --bg:             #1e1f2e;
    --card-bg:        #282a36;
    --card-border:    #44475a;
    --shadow-sm:      0 4px 12px rgba(0,0,0,0.4);
    --shadow-lg:      0 14px 40px rgba(0,0,0,0.5);
    --surface:        #21222c;
    --surface-border: #44475a;
    --text-1:         #f8f8f2;
    --text-2:         #cdd6f4;
    --text-3:         #6272a4;
    --text-4:         #6272a4;
    --text-heading:   #f8f8f2;
    --accent:         #bd93f9;
    --accent-mid:     #ff79c6;
    --accent-dark:    #caa9fa;
    --accent-light:   #3d3659;
    --accent-xlight:  #2e2b48;
    --accent-border:  #6e548a;
    --code-text:      #8be9fd;
    --top-bar:        linear-gradient(to right, #bd93f9, #ff79c6, #8be9fd);
    --progress-track: #3d3659;
    --ok-bg:  #0d2014;  --ok-bdr:  #50fa7b;  --ok-txt:  #50fa7b;
    --err-bg: #2d1010;  --err-bdr: #ff5555;  --err-txt: #ff5555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    transition: background 0.25s;
  }
  h1 { font-size: 1.6rem; font-weight: 900; color: var(--text-heading); letter-spacing: -0.04em; margin-bottom: 2px; }
  .subtitle { font-size: 0.8rem; color: var(--accent-mid); font-weight: 600; }

  .title-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; width: 100%; max-width: 820px; }
  .theme-switcher { display: flex; gap: 4px; margin-left: auto; }
  .theme-btn {
    padding: 4px 11px;
    font-size: 0.65rem; font-weight: 800;
    border: 1.5px solid var(--card-border); border-radius: 99px;
    background: var(--card-bg); color: var(--text-3);
    cursor: pointer; transition: all 0.15s;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .theme-btn:hover  { color: var(--accent); border-color: var(--accent-border); }
  .theme-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  .layout {
    display: flex;
    flex-direction: row;
    gap: 14px;
    align-items: flex-start;
    width: 100%;
    max-width: 820px;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 190px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: sticky;
    top: 16px;
  }
  .score-box {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 1rem;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow-sm);
  }
  .score-label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-3); }
  .score-value { font-size: 1.3rem; font-weight: 900; color: var(--text-1); }

  .progress-bar-track { height: 5px; background: var(--progress-track); border-radius: 99px; margin: 2px 0; }
  .progress-bar-fill  { height: 5px; border-radius: 99px; background: var(--accent); transition: width 0.4s ease; }

  .q-tracker { display: flex; flex-wrap: wrap; gap: 5px; }
  .q-dot {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--surface-border); background: var(--card-bg);
    font-size: 0.6rem; font-weight: 800; color: var(--text-3);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .q-dot.answered  { background: var(--accent-light); border-color: var(--accent); color: var(--accent); cursor: pointer; }
  .q-dot.answered:hover { filter: brightness(1.2); }
  .q-dot.current   { background: var(--accent); border-color: var(--accent); color: white; }
  .q-dot.reviewing { background: #f59e0b; border-color: #d97706; color: white; cursor: pointer; }

  .tracker-label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-3); }

  /* ── Window selector ── */
  .window-selector { display: flex; gap: 4px; }
  .win-btn {
    flex: 1; padding: 4px 2px;
    font-size: 0.65rem; font-weight: 800;
    border: 1.5px solid var(--surface-border); border-radius: 99px;
    background: var(--card-bg); color: var(--text-3);
    cursor: pointer; transition: all 0.15s;
  }
  .win-btn:hover  { background: var(--accent-xlight); color: var(--accent); border-color: var(--accent-border); }
  .win-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .wrong-badge {
    font-size: 0.6rem; font-weight: 800; color: var(--err-txt);
    background: var(--err-bg); border: 1px solid var(--err-bdr);
    border-radius: 99px; padding: 3px 10px; text-align: center;
  }

  /* ── Card ── */
  .card {
    flex: 1;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 1.5rem;
    box-shadow: var(--shadow-lg);
    padding: 22px;
    min-width: 0;
    position: relative;
    overflow: hidden;
    transition: background 0.25s, border-color 0.25s;
  }
  .top-bar {
    height: 4px;
    background: var(--top-bar);
    margin: -22px -22px 18px -22px;
    border-radius: 1.5rem 1.5rem 0 0;
  }

  /* ── Category toggle ── */
  .cat-toggle { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 16px; }
  .cat-btn {
    padding: 5px 11px;
    font-size: 0.68rem; font-weight: 800;
    border: 1.5px solid var(--card-border); border-radius: 99px;
    background: var(--card-bg); color: var(--text-3);
    cursor: pointer; transition: all 0.15s;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .cat-btn:hover  { background: var(--accent-xlight); color: var(--accent); border-color: var(--accent-border); }
  .cat-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* ── Question ── */
  .cat-badge {
    font-size: 0.62rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.2em; color: var(--accent-mid); margin-bottom: 6px;
  }
  .question-text {
    font-size: 1.05rem; font-weight: 800; color: var(--text-1);
    line-height: 1.4; margin-bottom: 18px;
  }
  code {
    font-family: 'Menlo', 'Consolas', monospace;
    background: var(--surface); border: 1px solid var(--surface-border);
    border-radius: 4px; padding: 1px 6px;
    font-size: 0.92em; color: var(--code-text);
  }

  /* ── Answer choices ── */
  .choices { display: flex; flex-direction: column; gap: 9px; }
  .choice-btn {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 11px 16px;
    background: var(--card-bg); border: 1.5px solid var(--surface-border);
    border-radius: 0.9rem; cursor: pointer;
    font-size: 0.88rem; font-weight: 700; color: var(--text-2);
    text-align: left; transition: all 0.12s;
  }
  .choice-btn:hover:not(:disabled) { background: var(--accent-xlight); border-color: var(--accent-border); color: var(--text-heading); }
  .choice-btn .letter {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--surface); border: 1.5px solid var(--surface-border);
    font-size: 0.72rem; font-weight: 900; color: var(--text-4);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.12s;
  }
  .choice-btn.selected {
    background: var(--accent-light); border-color: var(--accent); color: var(--text-heading);
  }
  .choice-btn.selected .letter {
    background: var(--accent); border-color: var(--accent); color: white;
  }
  .choice-btn:disabled { cursor: default; }

  /* ── End-of-set overlay ── */
  .set-summary {
    position: absolute; inset: 0;
    background: var(--card-bg); border-radius: 1.5rem;
    display: flex; flex-direction: column;
    padding: 24px; gap: 14px;
    overflow-y: auto; z-index: 20;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .summary-header { display: flex; align-items: baseline; gap: 10px; }
  .summary-score-num { font-size: 3rem; font-weight: 900; color: var(--text-heading); letter-spacing: -0.04em; line-height: 1; }
  .summary-score-den { font-size: 1rem; font-weight: 700; color: var(--text-3); }
  .summary-acc       { font-size: 1rem; font-weight: 800; color: var(--accent-mid); margin-left: auto; }

  .review-list { display: flex; flex-direction: column; gap: 8px; }
  .review-item {
    border-radius: 0.9rem; padding: 10px 14px;
    border: 1px solid;
  }
  .review-item.correct { background: var(--ok-bg);  border-color: var(--ok-bdr); }
  .review-item.wrong   { background: var(--err-bg); border-color: var(--err-bdr); }
  .review-q   { font-size: 0.78rem; font-weight: 800; color: var(--text-2); margin-bottom: 4px; }
  .review-q code { font-size: 0.85em; }
  .review-ans { font-size: 0.75rem; font-weight: 700; display: flex; flex-direction: column; gap: 2px; }
  .review-ans .you         { color: var(--err-txt); }
  .review-ans .correct-ans { color: var(--ok-txt); }
  .review-ans .ok          { color: var(--ok-txt); }

  .history-section { border-top: 1px solid var(--surface-border); padding-top: 12px; }
  .history-label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-3); margin-bottom: 8px; }
  .history-table { width: 100%; border-collapse: collapse; }
  .history-table th {
    font-size: 0.58rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--text-3); text-align: left;
    padding: 4px 6px; border-bottom: 1px solid var(--surface-border);
  }
  .history-table td {
    font-size: 0.78rem; font-weight: 700; color: var(--text-2);
    padding: 5px 6px; border-bottom: 1px solid var(--surface-border);
  }
  .history-table tr:last-child td { border-bottom: none; }
  .history-table td.acc-cell { color: var(--accent-mid); }
  .history-table tr.current-row td { color: var(--text-heading); font-weight: 900; }

  .next-set-btn {
    margin-top: 4px; align-self: center;
    background: var(--accent); color: white;
    border: none; border-radius: 99px;
    padding: 11px 32px; font-size: 0.88rem; font-weight: 800;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
  }
  .next-set-btn:hover  { background: var(--accent-dark); }
  .next-set-btn:active { transform: scale(0.97); }

  /* ── Exam picker ── */
  .question-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .question-header .cat-badge { margin-bottom: 0; }
  .star-btn {
    background: none; border: none; cursor: pointer;
    font-size: 1.25rem; line-height: 1; padding: 2px 4px;
    color: var(--text-3); transition: color 0.15s, transform 0.1s;
  }
  .star-btn:hover   { color: #f59e0b; transform: scale(1.15); }
  .star-btn.starred { color: #f59e0b; }

  .exam-counter {
    font-size: 0.82rem; font-weight: 900; color: var(--text-1);
    text-align: center; padding: 2px 0;
  }
  .exam-counter .pick-num { color: var(--accent); font-size: 1rem; }

  .export-btn {
    width: 100%; padding: 7px 10px;
    font-size: 0.68rem; font-weight: 800;
    border: none; border-radius: 99px;
    background: #f59e0b; color: white;
    cursor: pointer; transition: background 0.15s;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .export-btn:hover:not(:disabled) { background: #d97706; }
  .export-btn:disabled { opacity: 0.35; cursor: default; }
</style>
<script>try{var _t=localStorage.getItem('quiz-theme');if(_t&&_t!=='light')document.documentElement.setAttribute('data-theme',_t==='dark'?'dracula':_t);}catch(e){}</script>
</head>
<body>

<h1>&#128039; Linux Quiz</h1>
<div class="title-row">
  <p class="subtitle">Master the command line, one question at a time.</p>
  <div class="theme-switcher">
    <button class="theme-btn active" data-t="light" onclick="setTheme('light',this)">Light</button>
    <button class="theme-btn" data-t="navy"  onclick="setTheme('navy',this)">Navy</button>
    <button class="theme-btn" data-t="dark"  onclick="setTheme('dark',this)">Dark</button>
  </div>
</div>

<div class="layout">

  <aside class="sidebar">
    <div class="score-box">
      <div class="score-label">Question</div>
      <div class="score-value" id="scoreQuestion">1 / 10</div>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
    <div class="tracker-label">Progress</div>
    <div class="q-tracker" id="qTracker"></div>

    <div class="tracker-label" style="margin-top:6px;">Avoid recent</div>
    <div class="window-selector">
      <button class="win-btn" onclick="setWindow(10,this)">10</button>
      <button class="win-btn active" onclick="setWindow(20,this)">20</button>
      <button class="win-btn" onclick="setWindow(30,this)">30</button>
      <button class="win-btn" onclick="setWindow(0,this)">Off</button>
    </div>
    <div class="wrong-badge" id="wrongBadge" style="display:none"></div>

    <div class="tracker-label" style="margin-top:6px;">Exam picks</div>
    <div class="exam-counter" id="examCounter"><span class="pick-num">0</span> / 50</div>
    <button class="export-btn" id="exportBtn" onclick="exportExamCSV()" disabled>⬇ Export CSV</button>
  </aside>

  <div class="card">
    <div class="top-bar"></div>

    <!-- End-of-set summary overlay -->
    <div class="set-summary" id="setSummary" style="display:none">
      <div class="summary-header">
        <div class="summary-score-num" id="summaryScore">0</div>
        <div class="summary-score-den">out of 10</div>
        <div class="summary-acc" id="summaryAcc">--%</div>
      </div>

      <div class="review-list" id="reviewList"></div>

      <div class="history-section">
        <div class="history-label">Set History</div>
        <table class="history-table">
          <thead><tr><th>Set</th><th>Score</th><th>Accuracy</th><th>Category</th></tr></thead>
          <tbody id="summaryHistory"></tbody>
        </table>
      </div>

      <button class="next-set-btn" onclick="startNextSet()">Next Set &rarr;</button>
    </div>

    <!-- Quiz -->
    <div id="quizArea">
      <div class="cat-toggle">
        <button class="cat-btn active" data-cat="all"      onclick="setCat('all',this)">All</button>
        <button class="cat-btn"        data-cat="packages" onclick="setCat('packages',this)">Packages</button>
        <button class="cat-btn"        data-cat="users"    onclick="setCat('users',this)">Users</button>
        <button class="cat-btn"        data-cat="files"    onclick="setCat('files',this)">Files</button>
        <button class="cat-btn"        data-cat="network"  onclick="setCat('network',this)">Network</button>
        <button class="cat-btn"        data-cat="services"    onclick="setCat('services',this)">Services</button>
        <button class="cat-btn"        data-cat="security"    onclick="setCat('security',this)">Security</button>
        <button class="cat-btn"        data-cat="permissions" onclick="setCat('permissions',this)">Permissions</button>
      </div>

      <div class="question-header">
        <div class="cat-badge" id="catBadge">Packages</div>
        <button class="star-btn" id="starBtn" onclick="toggleStar()" title="Add to exam picks">☆</button>
      </div>
      <div class="question-text" id="questionText">Loading...</div>
      <div class="choices" id="choices"></div>
    </div>
  </div>

</div>

<script>
// ── Question bank ─────────────────────────────────────────────────────────────
// Each question: { cat, q, choices: [4 strings], correct: 'exact string' }

const QUESTIONS = [
  // ── Packages ──
  { cat:'packages', q:'Which command updates the local package index on Debian/Ubuntu?',
    choices:['apt upgrade','apt update','apt install','apt refresh'], correct:'apt update' },

  { cat:'packages', q:'Which command installs a package using APT?',
    choices:['apt get nginx','apt add nginx','apt install nginx','apt fetch nginx'], correct:'apt install nginx' },

  { cat:'packages', q:'Which command removes a package AND its configuration files?',
    choices:['apt remove','apt delete','apt purge','apt uninstall'], correct:'apt purge' },

  { cat:'packages', q:'Which command searches for an available package by name?',
    choices:['apt find','apt search','apt locate','apt query'], correct:'apt search' },

  { cat:'packages', q:'Which command lists all currently installed packages?',
    choices:['apt list','dpkg -l','apt show','pkg list'], correct:'dpkg -l' },

  { cat:'packages', q:'What does <code>apt upgrade</code> do?',
    choices:['Updates the package index','Installs new packages','Upgrades all installed packages','Removes old packages'], correct:'Upgrades all installed packages' },

  { cat:'packages', q:'Which command shows detailed information about an available package?',
    choices:['apt info nginx','apt show nginx','apt describe nginx','pkg show nginx'], correct:'apt show nginx' },

  { cat:'packages', q:'Which command downloads a .deb file and installs it?',
    choices:['apt install file.deb','dpkg -i file.deb','deb install file.deb','pkg -i file.deb'], correct:'dpkg -i file.deb' },

  // ── Users ──
  { cat:'users', q:'Which command is used to add a new user on Linux?',
    choices:['useradd','usermod','groupadd','passwd'], correct:'useradd' },

  { cat:'users', q:'Which command changes a user\'s password?',
    choices:['chpass','usermod','passwd','setpwd'], correct:'passwd' },

  { cat:'users', q:'Which command adds an existing user to a group?',
    choices:['usermod -aG groupname username','addgroup username groupname','groupadd username','chgroup username groupname'], correct:'usermod -aG groupname username' },

  { cat:'users', q:'Which file stores basic user account information?',
    choices:['/etc/users','/etc/passwd','/etc/accounts','/etc/login'], correct:'/etc/passwd' },

  { cat:'users', q:'Which command displays the current logged-in username?',
    choices:['who','id','whoami','user'], correct:'whoami' },

  { cat:'permissions', q:'What permission value does the number 4 represent?',
    choices:['Execute','Write','Read','None'], correct:'Read' },

  { cat:'permissions', q:'Which command makes a script executable?',
    choices:['chmod +x script.sh','exec script.sh','run script.sh','chmod 644 script.sh'], correct:'chmod +x script.sh' },

  { cat:'permissions', q:'What does <code>chmod 755</code> allow?',
    choices:['Everyone can read, write, and execute','Owner can do everything; others can only read and execute','Only the owner can read and write','Nobody can access the file'], correct:'Owner can do everything; others can only read and execute' },

  { cat:'permissions', q:'Which command changes the owner of a file to <code>bob</code>?',
    choices:['chown bob file.txt','chmod bob file.txt','owner bob file.txt','usermod bob file.txt'], correct:'chown bob file.txt' },

  { cat:'users', q:'Which file do you edit to configure sudo privileges?',
    choices:['/etc/sudo','/etc/sudoers','/etc/passwd','/etc/groups'], correct:'/etc/sudoers' },

  // ── Files ──
  { cat:'files', q:'Which flag shows hidden files with <code>ls</code>?',
    choices:['ls -h','ls -a','ls -l','ls --show'], correct:'ls -a' },

  { cat:'files', q:'Which command shows disk usage of the current directory?',
    choices:['df -h .','du -sh .','size .','diskspace .'], correct:'du -sh .' },

  { cat:'files', q:'Which command shows available disk space on all mounted filesystems?',

const CAT_LABELS = {
  packages: 'Package Management',
  users:    'Users & Permissions',
  files:    'Files & Filesystem',
  network:  'Networking & Firewall',
  services: 'Processes & Services',
  security:    'Security & Hardening',
  permissions: 'File Permissions',
};

const SET_SIZE = 10;
const LETTERS  = ['A','B','C','D'];

// ── State ─────────────────────────────────────────────────────────────────────
let catMode         = 'all';
let setHistory      = [];
let setAnswers      = [];
let setQuestion     = 0;
let currentQ        = null;
let currentShuffled = [];
let answered        = false;

// ── Smart history ─────────────────────────────────────────────────────────────
let recentHistory   = [];   // question texts asked recently, oldest first
let wrongPool       = new Map(); // q.q → question obj; questions answered incorrectly
let recentWindowSize = 20;  // how many recent questions to avoid

function setWindow(n, btn) {
  recentWindowSize = n;
  document.querySelectorAll('.win-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function updateWrongBadge() {
  const badge = document.getElementById('wrongBadge');
  const count = wrongPool.size;
  if (count === 0) { badge.style.display = 'none'; return; }
  badge.style.display = 'block';
  badge.textContent = count + ' to retry';
}

// ── Category toggle ───────────────────────────────────────────────────────────
function setCat(cat, btnEl) {
  catMode = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  resetSet();
}

// ── Pool ─────────────────────────────────────────────────────────────────────
function getPool() {
  if (catMode === 'all') return QUESTIONS;
  return QUESTIONS.filter(q => q.cat === catMode);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Build question tracker dots ───────────────────────────────────────────────
function buildTracker() {
  const el = document.getElementById('qTracker');
  el.innerHTML = '';
  for (let i = 0; i < SET_SIZE; i++) {
    const dot = document.createElement('div');
    dot.className = 'q-dot' + (i === 0 ? ' current' : '');
    dot.textContent = i + 1;
    dot.id = 'dot-' + i;
    el.appendChild(dot);
  }
}

function updateTracker() {
  for (let i = 0; i < SET_SIZE; i++) {
    const dot = document.getElementById('dot-' + i);
    if (!dot) continue;
    dot.className = 'q-dot';
    if (i === reviewingIdx)        dot.classList.add('reviewing');
    else if (i < setQuestion)      dot.classList.add('answered');
    else if (i === setQuestion && reviewingIdx < 0) dot.classList.add('current');
  }
}

// ── Review mode ───────────────────────────────────────────────────────────────
let reviewingIdx = -1; // -1 = on current question; ≥0 = reviewing a past answer

function goToQuestion(i) {
  if (i >= setAnswers.length) return; // can't jump to unanswered questions
  reviewingIdx = i;
  const entry = setAnswers[i];

  document.getElementById('catBadge').textContent = CAT_LABELS[entry.cat] || entry.cat;
  document.getElementById('questionText').innerHTML = entry.q;
  document.getElementById('scoreQuestion').textContent = 'Reviewing ' + (i + 1);

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  entry.choices.forEach((text, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (text === entry.user ? ' selected' : '');
    btn.innerHTML = '<span class="letter">' + LETTERS[idx] + '</span><span>' + text + '</span>';
    btn.addEventListener('click', () => handleReAnswer(idx, entry));
    choicesEl.appendChild(btn);
  });

  updateTracker();
  updateStarBtn(entry.q);
}

function handleReAnswer(idx, entry) {
  const newAnswer = entry.choices[idx];
  const isCorrect = newAnswer === entry.correct;

  entry.user = newAnswer;
  entry.ok   = isCorrect;

  if (isCorrect) wrongPool.delete(entry.q);
  else           wrongPool.set(entry.q, { q: entry.q, cat: entry.cat, choices: entry.choices, correct: entry.correct });
  updateWrongBadge();

  // Return to the live question
  reviewingIdx = -1;
  renderCurrentQuestion();
  updateTracker();
}

// ── Render current question ───────────────────────────────────────────────────
function renderCurrentQuestion() {
  document.getElementById('catBadge').textContent = CAT_LABELS[currentQ.cat] || currentQ.cat;
  document.getElementById('questionText').innerHTML = currentQ.q;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  currentShuffled.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = '<span class="letter">' + LETTERS[i] + '</span><span>' + text + '</span>';
    btn.addEventListener('click', () => handleAnswer(i, btn));
    choicesEl.appendChild(btn);
  });

  document.getElementById('scoreQuestion').textContent = (setQuestion + 1) + ' / ' + SET_SIZE;
  document.getElementById('progressBar').style.width = (setQuestion / SET_SIZE * 100) + '%';
  updateStarBtn(currentQ.q);
}

// ── Pick & render next question ───────────────────────────────────────────────
function nextQuestion() {
  answered = false;
  reviewingIdx = -1;
  const pool = getPool();
  const poolQs = new Set(pool.map(q => q.q));

  const usedThisSet = new Set(setAnswers.map(a => a.q));

  const recentWindow = recentWindowSize > 0
    ? new Set(recentHistory.slice(-recentWindowSize))
    : new Set();

  const wrongCandidates = [...wrongPool.values()].filter(q =>
    poolQs.has(q.q) && !usedThisSet.has(q.q) && !recentWindow.has(q.q)
  );
  const freshCandidates = pool.filter(q =>
    !usedThisSet.has(q.q) && !recentWindow.has(q.q)
  );
  const fallback = pool.filter(q => !usedThisSet.has(q.q));

  let pick;
  if (wrongCandidates.length > 0)       pick = wrongCandidates[Math.floor(Math.random() * wrongCandidates.length)];
  else if (freshCandidates.length > 0)  pick = freshCandidates[Math.floor(Math.random() * freshCandidates.length)];
  else if (fallback.length > 0)         pick = fallback[Math.floor(Math.random() * fallback.length)];
  else                                  pick = pool[Math.floor(Math.random() * pool.length)];

  recentHistory.push(pick.q);
  if (recentHistory.length > 60) recentHistory.shift();

  currentQ        = pick;
  currentShuffled = shuffle(pick.choices);

  renderCurrentQuestion();
  updateTracker();
}

// ── Answer handler ────────────────────────────────────────────────────────────
function handleAnswer(idx, btn) {
  if (answered) return;
  answered = true;

  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  btn.classList.add('selected');

  const userAnswer = currentShuffled[idx];
  const isCorrect  = userAnswer === currentQ.correct;

  if (isCorrect) wrongPool.delete(currentQ.q);
  else           wrongPool.set(currentQ.q, currentQ);
  updateWrongBadge();

  setAnswers.push({
    q:       currentQ.q,
    cat:     currentQ.cat,
    choices: currentShuffled,
    user:    userAnswer,
    correct: currentQ.correct,
    ok:      isCorrect,
  });

  setQuestion++;

  if (setQuestion >= SET_SIZE) {
    setTimeout(endOfSet, 600);
  } else {
    setTimeout(nextQuestion, 500);
  }
}

// ── End of set ────────────────────────────────────────────────────────────────
function endOfSet() {
  const score = setAnswers.filter(a => a.ok).length;
  const pct   = Math.round(score / SET_SIZE * 100);
  const catLabel = catMode === 'all' ? 'All' : (CAT_LABELS[catMode] || catMode);
  setHistory.push({ set: setHistory.length + 1, score, acc: pct, cat: catLabel });

  document.getElementById('summaryScore').textContent = score;
  document.getElementById('summaryAcc').textContent   = pct + '%';

  // Build review list
  const reviewEl = document.getElementById('reviewList');
  reviewEl.innerHTML = '';
  setAnswers.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'review-item ' + (a.ok ? 'correct' : 'wrong');
    let ansHtml;
    if (a.ok) {
      ansHtml = '<span class="ok">\u2713 ' + esc(a.user) + '</span>';
    } else {
      ansHtml = '<span class="you">\u2717 You said: ' + esc(a.user) + '</span>'
              + '<span class="correct-ans">\u2713 Correct: ' + esc(a.correct) + '</span>';
    }
    div.innerHTML = '<div class="review-q">Q' + (i+1) + '. ' + a.q + '</div>'
                  + '<div class="review-ans">' + ansHtml + '</div>';
    reviewEl.appendChild(div);
  });

  // Set history table
  const tbody = document.getElementById('summaryHistory');
  tbody.innerHTML = '';
  [...setHistory].reverse().slice(0, 8).forEach((h, i) => {
    const tr = document.createElement('tr');
    if (i === 0) tr.className = 'current-row';
    tr.innerHTML = '<td>' + h.set + '</td><td>' + h.score + ' / ' + SET_SIZE
                 + '</td><td class="acc-cell">' + h.acc + '%</td><td>' + h.cat + '</td>';
    tbody.appendChild(tr);
  });

  // Sidebar final state
  document.getElementById('scoreQuestion').textContent = SET_SIZE + ' / ' + SET_SIZE;
  document.getElementById('progressBar').style.width = '100%';
  for (let i = 0; i < SET_SIZE; i++) {
    const dot = document.getElementById('dot-' + i);
    if (dot) { dot.className = 'q-dot answered'; }
  }

  document.getElementById('setSummary').style.display = 'flex';
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Start next set ────────────────────────────────────────────────────────────
function startNextSet() {
  document.getElementById('setSummary').style.display = 'none';
  resetSet();
}

function resetSet() {
  setQuestion = 0;
  setAnswers  = [];
  document.getElementById('setSummary').style.display = 'none';
  buildTracker();
  nextQuestion();
}

// ── Exam picker ───────────────────────────────────────────────────────────────
let examPicks = new Set();
try { examPicks = new Set(JSON.parse(localStorage.getItem('exam-picks') || '[]')); } catch(e) {}

function saveExamPicks() {
  try { localStorage.setItem('exam-picks', JSON.stringify([...examPicks])); } catch(e) {}
}

function updateExamCounter() {
  const n = examPicks.size;
  document.getElementById('examCounter').innerHTML = '<span class="pick-num">' + n + '</span> / 50';
  document.getElementById('exportBtn').disabled = (n === 0);
}

function updateStarBtn(qText) {
  const btn = document.getElementById('starBtn');
  if (!btn) return;
  const on = examPicks.has(qText);
  btn.textContent = on ? '★' : '☆';
  btn.classList.toggle('starred', on);
  btn.title = on ? 'Remove from exam picks' : 'Add to exam picks';
}

function toggleStar() {
  const qText = reviewingIdx >= 0
    ? (setAnswers[reviewingIdx] ? setAnswers[reviewingIdx].q : null)
    : (currentQ ? currentQ.q : null);
  if (!qText) return;
  if (examPicks.has(qText)) examPicks.delete(qText);
  else examPicks.add(qText);
  saveExamPicks();
  updateExamCounter();
  updateStarBtn(qText);
}

function stripHtml(str) { return str.replace(/<[^>]+>/g, ''); }

function csvCell(str) {
  const s = stripHtml(str);
  return (s.includes(',') || s.includes('"') || s.includes('\n'))
    ? '"' + s.replace(/"/g, '""') + '"'
    : s;
}

function exportExamCSV() {
  const rows = [];
  for (const qText of examPicks) {
    const q = QUESTIONS.find(x => x.q === qText);
    if (!q) continue;
    const correctIdx = q.choices.indexOf(q.correct) + 1; // 1-based
    rows.push(['MC', '', '1', csvCell(q.q), correctIdx, ...q.choices.map(csvCell)].join(','));
  }
  if (!rows.length) return;
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'linux-exam-questions.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ── Theme switcher ────────────────────────────────────────────────────────────
function setTheme(theme, btn) {
  if (theme === 'light') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dracula' : theme);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  try { localStorage.setItem('quiz-theme', theme); } catch(e) {}
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildTracker();
nextQuestion();
updateExamCounter();

// Restore active theme button after DOM is ready
(function() {
  try {
    const saved = localStorage.getItem('quiz-theme');
    if (!saved || saved === 'light') return;
    const btn = document.querySelector('.theme-btn[data-t="' + saved + '"]');
    if (btn) { document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
  } catch(e) {}
})();

// Click any answered dot to review that question (disabled while summary is showing)
document.getElementById('qTracker').addEventListener('click', function(e) {
  if (document.getElementById('setSummary').style.display !== 'none') return;
  const dot = e.target.closest('.q-dot');
  if (!dot) return;
  const i = parseInt(dot.id.split('-')[1]);
  if (i < setAnswers.length) goToQuestion(i);
});
</script>
